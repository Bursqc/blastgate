name: Build Android APK

# Builds and publishes a release APK whenever:
#  - a v* tag is pushed (attached to the GitHub Release of that tag), OR
#  - the workflow is dispatched manually from the Actions tab
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to upload assets to releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get deps
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK (universal)
        working-directory: mobile
        run: flutter build apk --release

      - name: Build split APKs (per ABI — smaller per device)
        working-directory: mobile
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs for release asset clarity
        working-directory: mobile/build/app/outputs/flutter-apk
        run: |
          ls -la
          # If a tag triggered this, use it; else use SHA short
          VER="${GITHUB_REF_NAME:-$(git rev-parse --short HEAD)}"
          for src in app-release.apk app-arm64-v8a-release.apk app-armeabi-v7a-release.apk app-x86_64-release.apk; do
            if [ -f "$src" ]; then
              dst="blastgate-${VER}-${src#app-}"
              dst="${dst%-release.apk}.apk"
              mv "$src" "$dst"
              echo "Renamed $src -> $dst"
            fi
          done
          ls -la

      - name: Upload APKs as workflow artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: blastgate-apk-${{ github.ref_name }}
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Attach APKs to release (only when triggered by a v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/build/app/outputs/flutter-apk/*.apk
          fail_on_unmatched_files: false
