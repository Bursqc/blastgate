[env:wt32_s1_eth01]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; OTA-capable partition layout (app0 + app1 + spiffs)
; Replaces huge_app.csv which had no OTA slots
board_build.partitions = min_spiffs.csv

build_flags =
  -DFW_VERSION=\"1.2.0\"
  ; FW_BUILD comes from __DATE__ __TIME__ baked at compile time (see main.cpp)

; NOTE: BLE provisioning is intentionally NOT compiled in this firmware build.
; Adding it requires vendoring SimpleBLE + esp_gap_ble_api.h chain or migrating
; to pioarduino arduino-esp32 3.x (penv install issues on this machine).
; Flutter app's BLE Provisioning screen is fully wired and will work once the
; hub firmware exposes a BLE prov endpoint. See deferred task.

; No external lib_deps — uses only built-in Arduino ESP32 libraries
; Update.h (OTA) is part of ESP32 core, no extra dep needed

; NOTE: Do NOT use erase_flash.py in normal builds — it destroys NVS (WiFi creds, node names).
; Use only for factory reset: pio run -e factory_reset -t upload
; extra_scripts = pre:erase_flash.py
