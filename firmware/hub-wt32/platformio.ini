[env:wt32_s1_eth01]
; pioarduino arduino-esp32 3.x + ESP-IDF 5.x (proper BT/BLE chain)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; OTA-capable partition layout (app0 + app1 + spiffs)
; Replaces huge_app.csv which had no OTA slots
board_build.partitions = min_spiffs.csv

build_flags =
  -DFW_VERSION=\"1.4.2\"
  -DBLAST_BLE_PROV=1
  ; FW_BUILD comes from __DATE__ __TIME__ baked at compile time (see main.cpp)

; Use the vendored firmware/lib/WiFiProv (matches arduino-esp32 3.x /
; ESP-IDF 5.x with network_provisioning API).
lib_extra_dirs = ../lib

; No external lib_deps — uses only built-in Arduino ESP32 libraries
; Update.h (OTA) is part of ESP32 core, no extra dep needed

; NOTE: Do NOT use erase_flash.py in normal builds — it destroys NVS (WiFi creds, node names).
; Use only for factory reset: pio run -e factory_reset -t upload
; extra_scripts = pre:erase_flash.py
